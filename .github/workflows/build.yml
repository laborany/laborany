name: Build & Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a release'
        required: false
        default: 'false'
        type: boolean

jobs:
  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║                         Windows 构建                                      ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  build-windows:
    runs-on: windows-latest
    env:
      RUN_LOCAL_BIN_DEBUG: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            shared/package-lock.json
            src-api/package-lock.json
            agent-service/package-lock.json
            frontend/package-lock.json
            cli-bundle-x64/package-lock.json
            cli-bundle-arm64/package-lock.json

      - name: Update version from tag
        shell: pwsh
        run: |
          # 从 tag 提取版本号 (v0.2.8 -> 0.2.8)
          $VERSION = "${{ github.ref_name }}" -replace '^v', ''
          if (-not $VERSION) { $VERSION = "0.0.0" }
          Write-Host "Setting version to: $VERSION"

          # 更新 package.json
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.version = $VERSION
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json

          # 更新 src-api/package.json
          $api = Get-Content src-api/package.json | ConvertFrom-Json
          $api.version = $VERSION
          $api | ConvertTo-Json -Depth 10 | Set-Content src-api/package.json

          # 更新 frontend/package.json
          $fe = Get-Content frontend/package.json | ConvertFrom-Json
          $fe.version = $VERSION
          $fe | ConvertTo-Json -Depth 10 | Set-Content frontend/package.json

          # 更新 src-tauri/tauri.conf.json
          $tauri = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $tauri.version = $VERSION
          $tauri | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

      - name: Install dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          npm cache clean --force
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          for ($i = 1; $i -le 3; $i++) {
            Write-Host "Attempt $i of 3..."
            npm run install:all:ci
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "Attempt $i failed, cleaning cache and retrying in 10 seconds..."
            npm cache clean --force
            Start-Sleep -Seconds 10
          }
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Diagnose Windows npm/bin state
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          function Show-BinState([string]$dir, [string[]]$expectedBins) {
            Write-Host ""
            Write-Host "=== ${dir} ==="
            $nodeModules = Join-Path $dir "node_modules"
            $binDir = Join-Path $nodeModules ".bin"
            Write-Host "node_modules exists: $(Test-Path $nodeModules)"
            Write-Host ".bin exists: $(Test-Path $binDir)"

            if (Test-Path $binDir) {
              Write-Host "Top .bin entries:"
              Get-ChildItem -Path $binDir -Name | Sort-Object | Select-Object -First 50 | ForEach-Object {
                Write-Host "  - $_"
              }
            }

            foreach ($bin in $expectedBins) {
              $target = Join-Path $binDir $bin
              Write-Host ("check {0}: {1}" -f $bin, (Test-Path $target))
            }
          }

          Write-Host "Node: $(node -v)"
          Write-Host "npm: $(npm -v)"
          Write-Host "RUN_LOCAL_BIN_DEBUG=$env:RUN_LOCAL_BIN_DEBUG"
          Write-Host "npm config bin-links: $(npm config get bin-links)"
          Write-Host "npm config ignore-scripts: $(npm config get ignore-scripts)"
          Write-Host "npm config omit: $(npm config get omit)"
          Write-Host "workspace: $PWD"
          where.exe node
          where.exe npm

          Show-BinState "." @("electron-builder.cmd")
          Show-BinState "src-api" @("esbuild.cmd", "pkg.cmd", "tsc.cmd")
          Show-BinState "agent-service" @("esbuild.cmd", "pkg.cmd", "tsc.cmd")
          Show-BinState "frontend" @("tsc.cmd", "vite.cmd", "esbuild.cmd")

          Push-Location src-api
          node ../scripts/run-local-bin.js esbuild --version
          Pop-Location

          Push-Location agent-service
          node ../scripts/run-local-bin.js esbuild --version
          Pop-Location

          Push-Location frontend
          node ../scripts/run-local-bin.js tsc -v
          node ../scripts/run-local-bin.js vite --version
          Pop-Location

      - name: Build API and CLI bundle
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "RUN_LOCAL_BIN_DEBUG=$env:RUN_LOCAL_BIN_DEBUG"

          Write-Host ">>> npm run bundle:all:win"
          npm run bundle:all:win
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Write-Host ">>> npm run build:api:win"
          npm run build:api:win
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Write-Host ">>> npm run build:agent:win"
          npm run build:agent:win
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Write-Host ">>> npm run build:frontend"
          npm run build:frontend
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify bundled Git Bash
        shell: pwsh
        run: |
          $bash1 = Test-Path "git-bash\bin\bash.exe"
          $bash2 = Test-Path "git-bash\usr\bin\bash.exe"
          if (-not ($bash1 -or $bash2)) {
            Write-Error "Bundled git-bash is missing bash.exe"
            exit 1
          }
          Write-Host "Bundled git-bash detected."

      - name: Build Electron
        shell: pwsh
        run: |
          # 重试机制：最多尝试 3 次
          for ($i = 1; $i -le 3; $i++) {
            Write-Host "Attempt $i of 3..."
            .\node_modules\.bin\electron-builder.cmd --win --publish never
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "Attempt $i failed, retrying in 10 seconds..."
            Start-Sleep -Seconds 10
          }
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Dump diagnostics on failure
        if: failure()
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          Write-Host "=== Failure Diagnostics ==="
          Write-Host "Node: $(node -v)"
          Write-Host "npm: $(npm -v)"
          Write-Host "RUN_LOCAL_BIN_DEBUG=$env:RUN_LOCAL_BIN_DEBUG"

          git status --short

          $dirs = @(".", "src-api", "agent-service", "frontend")
          foreach ($dir in $dirs) {
            Write-Host ""
            Write-Host "=== ${dir} node_modules/.bin ==="
            $binDir = Join-Path $dir "node_modules/.bin"
            if (Test-Path $binDir) {
              Get-ChildItem -Path $binDir -Name | Sort-Object | Select-Object -First 80 | ForEach-Object {
                Write-Host "  - $_"
              }
            } else {
              Write-Host "  (missing)"
            }
          }

          Write-Host ""
          Write-Host "=== Dist directory snapshots ==="
          foreach ($dir in @("src-api/dist", "agent-service/dist", "frontend/dist", "release")) {
            Write-Host "-- $dir"
            if (Test-Path $dir) {
              Get-ChildItem -Path $dir -File -Recurse | Select-Object -First 30 FullName, Length
            } else {
              Write-Host "  (missing)"
            }
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: LaborAny-Windows
          path: release/*Setup*.exe
          retention-days: 3

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║                         macOS 构建 (Intel x64)                           ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  build-mac-x64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            shared/package-lock.json
            src-api/package-lock.json
            agent-service/package-lock.json
            frontend/package-lock.json
            cli-bundle-x64/package-lock.json
            cli-bundle-arm64/package-lock.json

      - name: Update version from tag
        run: |
          # 从 tag 提取版本号 (v0.2.8 -> 0.2.8)
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          [ -z "$VERSION" ] && VERSION="0.0.0"
          echo "Setting version to: $VERSION"

          # 更新所有 package.json 和 tauri.conf.json
          npm pkg set version="$VERSION"
          npm pkg set version="$VERSION" --workspace=src-api 2>/dev/null || true
          npm pkg set version="$VERSION" --workspace=frontend 2>/dev/null || true

          # 更新 tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json

      - name: Install dependencies
        run: |
          # 清理 npm 缓存，避免 SSL 缓存问题
          npm cache clean --force
          # 重试机制：最多尝试 3 次
          for i in 1 2 3; do
            echo "Attempt $i of 3..."
            npm config set fetch-retries 5
            npm config set fetch-retry-mintimeout 20000
            npm config set fetch-retry-maxtimeout 120000
            npm run install:all:ci && break
            echo "Attempt $i failed, cleaning cache and retrying in 10 seconds..."
            npm cache clean --force
            sleep 10
          done

      - name: Build API and CLI bundle
        run: |
          npm run bundle:cli:mac-x64
          npm run bundle:uv:mac-x64
          npm run build:api:mac-x64
          npm run build:agent:mac
          # 确保可执行文件有执行权限
          chmod +x src-api/dist/laborany-api-mac
          chmod +x agent-service/dist/laborany-agent-mac
          chmod +x cli-bundle/node
          chmod +x uv-bundle/uv

      - name: Build Frontend
        run: npm run build:frontend

      - name: Build Electron
        run: |
          # 重试机制：最多尝试 3 次
          for i in 1 2 3; do
            echo "Attempt $i of 3..."
            ./node_modules/.bin/electron-builder --mac --x64 --publish never && break
            echo "Attempt $i failed, retrying in 10 seconds..."
            sleep 10
          done

      - name: Upload Mac x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: LaborAny-Mac-x64
          path: release/*.dmg
          retention-days: 3

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║                         macOS 构建 (Apple Silicon arm64)                 ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            shared/package-lock.json
            src-api/package-lock.json
            agent-service/package-lock.json
            frontend/package-lock.json
            cli-bundle-x64/package-lock.json
            cli-bundle-arm64/package-lock.json

      - name: Update version from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          [ -z "$VERSION" ] && VERSION="0.0.0"
          echo "Setting version to: $VERSION"
          npm pkg set version="$VERSION"
          npm pkg set version="$VERSION" --workspace=src-api 2>/dev/null || true
          npm pkg set version="$VERSION" --workspace=frontend 2>/dev/null || true
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json

      - name: Install dependencies
        run: |
          # 清理 npm 缓存，避免 SSL 缓存问题
          npm cache clean --force
          # 重试机制：最多尝试 3 次
          for i in 1 2 3; do
            echo "Attempt $i of 3..."
            npm config set fetch-retries 5
            npm config set fetch-retry-mintimeout 20000
            npm config set fetch-retry-maxtimeout 120000
            npm run install:all:ci && break
            echo "Attempt $i failed, cleaning cache and retrying in 10 seconds..."
            npm cache clean --force
            sleep 10
          done

      - name: Build API and CLI bundle
        run: |
          npm run bundle:cli:mac-arm64
          npm run bundle:uv:mac-arm64
          npm run build:api:mac-arm64
          npm run build:agent:mac-arm64
          # 确保可执行文件有执行权限
          chmod +x src-api/dist/laborany-api-mac
          chmod +x agent-service/dist/laborany-agent-mac
          chmod +x cli-bundle/node
          chmod +x uv-bundle/uv

      - name: Build Frontend
        run: npm run build:frontend

      - name: Build Electron
        run: |
          # 重试机制：最多尝试 3 次
          for i in 1 2 3; do
            echo "Attempt $i of 3..."
            ./node_modules/.bin/electron-builder --mac --arm64 --publish never && break
            echo "Attempt $i failed, retrying in 10 seconds..."
            sleep 10
          done

      - name: Upload Mac arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: LaborAny-Mac-arm64
          path: release/*.dmg
          retention-days: 3

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║                         Linux 构建                                        ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            shared/package-lock.json
            src-api/package-lock.json
            agent-service/package-lock.json
            frontend/package-lock.json
            cli-bundle-x64/package-lock.json
            cli-bundle-arm64/package-lock.json

      - name: Update version from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          [ -z "$VERSION" ] && VERSION="0.0.0"
          echo "Setting version to: $VERSION"
          npm pkg set version="$VERSION"
          npm pkg set version="$VERSION" --workspace=src-api 2>/dev/null || true
          npm pkg set version="$VERSION" --workspace=frontend 2>/dev/null || true
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json

      - name: Install dependencies
        run: |
          # 清理 npm 缓存，避免 SSL 缓存问题
          npm cache clean --force
          # 重试机制：最多尝试 3 次
          for i in 1 2 3; do
            echo "Attempt $i of 3..."
            npm config set fetch-retries 5
            npm config set fetch-retry-mintimeout 20000
            npm config set fetch-retry-maxtimeout 120000
            npm run install:all:ci && break
            echo "Attempt $i failed, cleaning cache and retrying in 10 seconds..."
            npm cache clean --force
            sleep 10
          done

      - name: Build API and CLI bundle
        run: |
          npm run bundle:cli:linux
          npm run bundle:uv:linux
          npm run build:api:linux
          npm run build:agent:linux
          # 确保可执行文件有执行权限
          chmod +x src-api/dist/laborany-api-linux
          chmod +x agent-service/dist/laborany-agent-linux
          chmod +x cli-bundle/node
          chmod +x uv-bundle/uv

      - name: Build Frontend
        run: npm run build:frontend

      - name: Build Electron
        run: |
          # 重试机制：最多尝试 3 次
          for i in 1 2 3; do
            echo "Attempt $i of 3..."
            ./node_modules/.bin/electron-builder --linux --publish never && break
            echo "Attempt $i failed, retrying in 10 seconds..."
            sleep 10
          done

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: LaborAny-Linux
          path: |
            release/*.AppImage
            release/*.deb
          retention-days: 3

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║                         发布 Release                                      ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  release:
    needs: [build-windows, build-mac-x64, build-mac-arm64, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Delete old release assets
        run: |
          # ═════════════════════════════════════════════════════════════════════
          #  删除旧 release 中的所有 assets，避免上传同名文件冲突
          # ═════════════════════════════════════════════════════════════════════

          # 从 refs/tags/v0.2.8 提取 tag 名称 v0.2.8
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "Tag name: $TAG_NAME"

          # 尝试获取 release 的 asset 列表，如果 release 不存在则跳过
          ASSETS=$(gh release view "$TAG_NAME" --json assets -q '.assets[].name' 2>/dev/null || true)

          if [ -n "$ASSETS" ]; then
            echo "Found existing assets, deleting all..."
            echo "$ASSETS" | while IFS= read -r asset; do
              if [ -n "$asset" ]; then
                echo "Deleting: $asset"
                gh release delete-asset "$TAG_NAME" "$asset" --yes || true
              fi
            done
            echo "All old assets deleted"
          else
            echo "No existing assets found (or release does not exist yet)"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: ${{ endsWith(github.ref, '-alpha') || endsWith(github.ref, '-beta') }}
          generate_release_notes: true
          files: |
            artifacts/LaborAny-Windows/*Setup*.exe
            artifacts/LaborAny-Mac-x64/*.dmg
            artifacts/LaborAny-Mac-arm64/*.dmg
            artifacts/LaborAny-Linux/*.AppImage
            artifacts/LaborAny-Linux/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
